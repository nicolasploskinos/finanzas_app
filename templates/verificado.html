<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1e1e2e">
  <title>Finanzas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1e1e2e; color: #e2e8f0;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .card {
      background: #2a2a3e; border-radius: 20px;
      padding: 40px 32px; width: 100%; max-width: 400px; text-align: center;
    }
    .icon { font-size: 52px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    p { color: #94a3b8; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    a {
      display: inline-block; background: #60a5fa; color: white;
      border-radius: 12px; padding: 13px 28px;
      font-size: 15px; font-weight: 700; text-decoration: none;
    }
  </style>
</head>
<body>
<div class="card">
  {% if exito %}
    <div class="icon">✅</div>
    <h1>¡Cuenta verificada!</h1>
    <p>Tu email fue confirmado correctamente. Ya podés ingresar a tu cuenta.</p>
    <a href="/finanzas/login">Ingresar</a>
  {% else %}
    <div class="icon">❌</div>
    <h1>Link inválido</h1>
    <p>Este link de verificación no existe o ya fue usado. Intentá registrarte nuevamente.</p>
    <a href="/finanzas/login">Volver</a>
  {% endif %}
</div>
</body>
</html>
