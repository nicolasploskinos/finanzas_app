<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#1e1e2e">
  <title>Finanzas — Ingresar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #1e1e2e; --surface: #2a2a3e; --surface2: #313148;
      --blue: #60a5fa; --green: #4ade80; --red: #f87171;
      --text: #e2e8f0; --muted: #94a3b8; --border: #3f3f5a;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: var(--surface); border-radius: 20px;
      padding: 32px 28px; width: 100%; max-width: 400px;
    }
    .logo { font-size: 36px; text-align: center; margin-bottom: 6px; }
    h1 { text-align: center; font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 24px; }

    .tabs { display: flex; background: var(--surface2); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
    .tab {
      flex: 1; padding: 9px; text-align: center; border-radius: 8px;
      font-size: 14px; font-weight: 600; color: var(--muted); cursor: pointer; transition: all .2s;
    }
    .tab.active { background: var(--blue); color: white; }

    .campo { margin-bottom: 14px; }
    .campo label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    .campo input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 15px; padding: 12px 14px;
      outline: none;
    }
    .campo input:focus { border-color: var(--blue); }

    .btn {
      width: 100%; background: var(--blue); color: white; border: none;
      border-radius: 12px; padding: 15px; font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 6px; transition: opacity .2s;
    }
    .btn:active { opacity: .85; }

    .error {
      background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.3);
      color: var(--red); border-radius: 10px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 14px; display: none;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">💰</div>
  <h1>Control de Finanzas</h1>
  <p class="subtitle">Administrá tus ingresos y gastos</p>

  <div class="tabs">
    <div class="tab active" id="tab-login" onclick="setTab('login')">Ingresar</div>
    <div class="tab" id="tab-register" onclick="setTab('register')">Registrarse</div>
  </div>

  <div id="error-msg" class="error"></div>

  <!-- Login -->
  <div id="form-login">
    <div class="campo">
      <label>EMAIL</label>
      <input type="email" id="l-email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="campo">
      <label>CONTRASEÑA</label>
      <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" onclick="login()">Ingresar</button>
  </div>

  <!-- Register -->
  <div id="form-register" style="display:none">
    <div class="campo">
      <label>EMAIL</label>
      <input type="email" id="r-email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="campo">
      <label>NOMBRE DE USUARIO</label>
      <input type="text" id="r-user" placeholder="ej: nico123" autocomplete="username">
    </div>
    <div class="campo">
      <label>CONTRASEÑA</label>
      <input type="password" id="r-pass" placeholder="••••••••" autocomplete="new-password">
    </div>
    <button class="btn" onclick="register()">Crear cuenta</button>
  </div>
</div>

<script>
  function setTab(t) {
    document.getElementById("tab-login").classList.toggle("active", t === "login");
    document.getElementById("tab-register").classList.toggle("active", t === "register");
    document.getElementById("form-login").style.display    = t === "login"    ? "" : "none";
    document.getElementById("form-register").style.display = t === "register" ? "" : "none";
    ocultarError();
  }

  function mostrarError(msg) {
    const el = document.getElementById("error-msg");
    el.textContent = msg; el.classList.add("show");
  }
  function ocultarError() {
    document.getElementById("error-msg").classList.remove("show");
  }

  async function login() {
    const email = document.getElementById("l-email").value.trim();
    const pass  = document.getElementById("l-pass").value;
    if (!email || !pass) { mostrarError("Completá todos los campos"); return; }

    const r = await fetch("/api/finanzas/login", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ email, password: pass })
    });
    const data = await r.json();
    if (data.ok) window.location.href = "/finanzas";
    else mostrarError(data.error);
  }

  async function register() {
    const email    = document.getElementById("r-email").value.trim();
    const username = document.getElementById("r-user").value.trim();
    const pass     = document.getElementById("r-pass").value;
    if (!email || !username || !pass) { mostrarError("Completá todos los campos"); return; }

    const r = await fetch("/api/finanzas/register", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ email, username, password: pass })
    });
    const data = await r.json();
    if (data.ok) window.location.href = "/finanzas";
    else mostrarError(data.error);
  }

  // Enter para enviar
  document.addEventListener("keydown", e => {
    if (e.key !== "Enter") return;
    if (document.getElementById("form-login").style.display !== "none") login();
    else register();
  });
</script>
</body>
</html>
